<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediksi Risiko Diabetes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow rounded-4 p-4">
            <h3 class="text-center mb-4">Prediksi Risiko Diabetes</h3>
            <form method="POST" action="/predict">
                <div class="mb-3">
                    <label for="age" class="form-label">Usia (Age)</label>
                    <input type="number" class="form-control" id="age" name="age" required>
                </div>
                <div class="mb-3">
                    <label for="pregnancies" class="form-label">Kehamilan (Pregnancies)</label>
                    <input type="number" class="form-control" id="pregnancies" name="pregnancies" required>
                </div>
                <div class="mb-3">
                    <label for="blood_pressure" class="form-label">Tekanan Darah (Blood Pressure)</label>
                    <input type="number" class="form-control" id="blood_pressure" name="blood_pressure" required>
                </div>
                <div class="mb-3">
                    <label for="skin_thickness" class="form-label">Ketebalan Kulit (Skin Thickness)</label>
                    <input type="number" class="form-control" id="skin_thickness" name="skin_thickness" required>
                </div>
                <div class="mb-3">
                    <label for="insulin" class="form-label">Insulin (Insulin)</label>
                    <input type="number" class="form-control" id="insulin" name="insulin" required>
                </div>
                <div class="mb-3">
                    <label for="glucose" class="form-label">Kadar Glukosa (Glucose)</label>
                    <input type="number" class="form-control" id="glucose" name="glucose" required>
                </div>
                <div class="mb-3">
                    <label for="bmi" class="form-label">Indeks Massa Tubuh (BMI)</label>
                    <input type="number" class="form-control" id="bmi" name="bmi" required>
                </div>
                <div class="mb-3">
                    <label for="dpf" class="form-label">Diabetes pedigree</label>
                    <input type="number" class="form-control" id="dpf" name="dpf" step="0.001" required>
                </div>                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Prediksi</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
